name: Build and Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Least privilege by default; only the release job needs to write (create a Release).
permissions:
  contents: read

jobs:
  # Runs on every pull request AND every push to main, so tests gate PRs before merge.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Generate HTML coverage report
        run: |
          sudo apt-get update -y
          sudo apt-get install -y lcov
          genhtml coverage/lcov.info --output-directory coverage/html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # Builds the standalone HTML and publishes a Release. Only on push to main (not PRs),
  # and only once the test job has passed.
  release:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build standalone HTML
        run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }} (${{ github.sha }})
          files: dist/sbom-support-lookup.html
          generate_release_notes: true
